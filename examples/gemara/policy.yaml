title: Container Platform Policy
metadata:
  id: container-platform-policy
  type: Policy
  gemara-version: v1.0.0
  description: Organization policy for container platform security, importing container security controls and guidance.
  author:
    id: complypack-examples
    name: ComplyPack Examples
    type: Software Assisted
  mapping-references:
    - id: container-security-controls
      title: Container Security Controls
      version: "1.0.0"
    - id: container-security-guidance
      title: Container Security Guidance
      version: "1.0.0"
contacts:
  responsible:
    - name: Platform Security Team
  accountable:
    - name: CISO Office
scope:
  in:
    technologies:
      - kubernetes
      - docker
    groups:
      - production
imports:
  catalogs:
    - reference-id: container-security-controls
  guidance:
    - reference-id: container-security-guidance
adherence:
  evaluation-methods:
    - id: eval-opa
      type: Behavioral
      mode: Automated
      description: Policy evaluation using OPA/Rego rules against resource configurations.
  assessment-plans:
    - id: ap-tls-version
      requirement-id: CTL-TLS-001-AR1
      frequency: continuous
      evaluation-methods:
        - id: eval-tls-version
          type: Behavioral
          mode: Automated
      parameters:
        - id: param-tls-min-version
          label: tls_minimum_version
          description: The minimum TLS protocol version that must be enforced on all ingress endpoints.
          accepted-values:
            - "1.2"
            - "1.3"
    - id: ap-tls-ciphers
      requirement-id: CTL-TLS-001-AR2
      frequency: continuous
      evaluation-methods:
        - id: eval-tls-ciphers
          type: Behavioral
          mode: Automated
      parameters:
        - id: param-approved-ciphers
          label: approved_cipher_suites
          description: The set of cipher suites permitted for TLS connections.
          accepted-values:
            - TLS_AES_128_GCM_SHA256
            - TLS_AES_256_GCM_SHA384
            - TLS_CHACHA20_POLY1305_SHA256
    - id: ap-cert-validity
      requirement-id: CTL-CERT-001-AR1
      frequency: daily
      evaluation-methods:
        - id: eval-cert-validity
          type: Behavioral
          mode: Automated
      evidence-requirements: Certificate metadata including notBefore, notAfter, and issuer fields.
      parameters:
        - id: param-max-validity-days
          label: max_validity_days
          description: Maximum allowed certificate validity period in days.
          accepted-values:
            - "90"
    - id: ap-cert-issuer
      requirement-id: CTL-CERT-001-AR2
      frequency: daily
      evaluation-methods:
        - id: eval-cert-issuer
          type: Behavioral
          mode: Automated
      parameters:
        - id: param-approved-issuers
          label: approved_certificate_authorities
          description: List of approved certificate authority names or identifiers.
          accepted-values:
            - internal-ca.example.com
