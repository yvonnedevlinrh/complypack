name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: none
  id-token: none
  security-events: none
  packages: none

jobs:
  call_reusable_vuln_scan:
    name: OSV-Scanner
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: complytime/org-infra/.github/workflows/reusable_vuln_scan.yml@aff4817ed6f0364e7f899bfb63ec6db42e69fde2 # v0.6.0
    with:
      # OSV focuses on known CVEs in dependencies; Trivy adds broader coverage
      enable_trivy_source: false

  call_reusable_security:
    name: OpenSSF Scorecards
    permissions:
      contents: read
      id-token: write
      security-events: write
    uses: complytime/org-infra/.github/workflows/reusable_security.yml@aff4817ed6f0364e7f899bfb63ec6db42e69fde2 # v0.6.0
