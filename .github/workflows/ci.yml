---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5.2.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Run acceptance tests
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@v2.29.0
          ginkgo -v acceptance/

      - name: Coverage
        if: matrix.go-version == '1.26'
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@37b9e82025fb9d0b4079cfe0bbd7f0434f79e692 # main
    permissions:
      contents: read
      issues: read
      pull-requests: read

  call_reusable_security:
    name: Security Scan
    uses: complytime/org-infra/.github/workflows/reusable_security.yml@e30c5cd87e7aeddb8aa7bfeccff4d362bd886270 # main
    permissions:
      contents: read
      id-token: write
      actions: read
      security-events: write

  call_reusable_vuln_scan:
    name: Vulnerability Scan
    uses: complytime/org-infra/.github/workflows/reusable_vuln_scan.yml@e30c5cd87e7aeddb8aa7bfeccff4d362bd886270 # main
    permissions:
      contents: read
      actions: read
      security-events: write
      packages: write
      id-token: write
