---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5.2.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Coverage
        if: matrix.go-version == '1.25'
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@d35e6fc04dd11151a92522287782344aaea91388 # main
    permissions:
      contents: read
      issues: read

  call_reusable_security:
    name: Security Scan
    uses: complytime/org-infra/.github/workflows/reusable_security.yml@d35e6fc04dd11151a92522287782344aaea91388 # main
    permissions:
      contents: read
      id-token: write
      actions: read
      security-events: write

  call_reusable_vuln_scan:
    name: Vulnerability Scan
    uses: complytime/org-infra/.github/workflows/reusable_vuln_scan.yml@d35e6fc04dd11151a92522287782344aaea91388 # main
    permissions:
      contents: read
      actions: read
      security-events: write
      packages: write
      id-token: write
