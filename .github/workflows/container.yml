name: Container Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: read

jobs:
  push:
    uses: complytime/org-infra/.github/workflows/reusable_publish_ghcr.yml@68fa970f535858f703369a6de4baa2237c38fa3c # main
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      attestations: write
    with:
      component_name: complypack
      containerfile_path: Containerfile
      context_path: .
      image_name: complytime/complypack
      image_description: "ComplyPack MCP server for compliance policy generation"
      platforms: linux/amd64,linux/arm64

  scan:
    needs: push
    if: >-
      always()
      && needs.push.result == 'success'
      && needs.push.outputs.image != ''
    uses: complytime/org-infra/.github/workflows/reusable_trivy_image_scan.yml@e266be092e71ac9343fcd6d5cafc50402161981e # main
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    with:
      image_ref: ${{ needs.push.outputs.image_ref }}
      image_digest: ${{ needs.push.outputs.digest }}
      trivy_severity: HIGH,CRITICAL

  sign:
    needs: [push, scan]
    if: >-
      always()
      && needs.push.result == 'success'
    uses: complytime/org-infra/.github/workflows/reusable_sign_and_verify.yml@e30c5cd87e7aeddb8aa7bfeccff4d362bd886270 # main
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      image_name: ${{ needs.push.outputs.image }}
      digest: ${{ needs.push.outputs.digest }}
      allowed_identity_regex: "https://github.com/complytime/org-infra(/.*)?$"
      verify_vuln: ${{ needs.scan.result == 'success' }}
