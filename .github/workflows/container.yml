name: Container Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: read

jobs:
  push:
    uses: complytime/org-infra/.github/workflows/reusable_publish_ghcr.yml@638b2037394ca0f0b860a135c7c27dce75fd3c03 # v0.5.0
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      attestations: write
    with:
      component_name: complypack
      containerfile_path: Containerfile
      context_path: .
      image_name: complytime/complypack
      image_description: "ComplyPack MCP server for compliance policy generation"
      platforms: linux/amd64,linux/arm64

  scan:
    needs: push
    if: >-
      always()
      && needs.push.result == 'success'
      && needs.push.outputs.image != ''
    uses: complytime/org-infra/.github/workflows/reusable_trivy_image_scan.yml@aff4817ed6f0364e7f899bfb63ec6db42e69fde2 # v0.6.0
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    with:
      image_ref: ${{ needs.push.outputs.image_ref }}
      image_digest: ${{ needs.push.outputs.digest }}
      trivy_severity: HIGH,CRITICAL

  sign:
    needs: [push, scan]
    if: >-
      always()
      && needs.push.result == 'success'
    uses: complytime/org-infra/.github/workflows/reusable_sign_and_verify.yml@638b2037394ca0f0b860a135c7c27dce75fd3c03 # v0.5.0
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      image_name: ${{ needs.push.outputs.image }}
      digest: ${{ needs.push.outputs.digest }}
      allowed_identity_regex: "https://github.com/complytime/org-infra(/.*)?$"
      verify_vuln: ${{ needs.scan.result == 'success' }}
